<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JurisGenie</title>
    <link rel="shortcut icon" href="images/Untitled design (2)-modified.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .mesh-bg {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
        }
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="mesh-bg min-h-screen flex flex-col justify-center items-center p-4">

    <!-- Brand Header -->
    <header class="fixed top-0 left-0 w-full p-6 flex justify-between items-center z-50">
        <a href="index.html" class="flex items-center gap-3 group">
            <div class="bg-white/10 backdrop-blur-md p-2 rounded-xl border border-white/20 group-hover:scale-110 transition-transform">
                <img src="images/Gemini_Generated_Image_fn3u6efn3u6efn3u2122.png" alt="JurisGenie" class="w-8 h-8 rounded-lg shadow-sm">
            </div>
            <span class="text-2xl font-bold text-white tracking-tight">JurisGenie</span>
        </a>
        <nav class="hidden md:flex gap-6 text-white/80 font-medium">
            <a href="index.html" class="hover:text-white transition-colors">Home</a>
            <a href="product.html" class="hover:text-white transition-colors">Product</a>
            <a href="why-world.html" class="hover:text-white transition-colors">Global Vision</a>
            <a href="about.html" class="hover:text-white transition-colors">About</a>
        </nav>
    </header>

    <!-- Login Card -->
    <div class="glass-card w-full max-w-md rounded-3xl p-8 md:p-10 animate-fade-in relative overflow-hidden mt-16">
        <!-- Decoration bits -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-purple-500/10 rounded-full blur-3xl"></div>

        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">Welcome Back</h1>
            <p class="text-slate-500">The world's first deterministic legal engine.</p>
        </div>

        <!-- Social Logins -->
        <div class="space-y-3 mb-8">
            <button class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 py-3.5 px-4 rounded-2xl font-semibold text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all hover:shadow-md group">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 group-hover:scale-110 transition-transform" alt="Google">
                Log in with Google
            </button>
            <button class="w-full flex items-center justify-center gap-3 bg-slate-900 border border-slate-900 py-3.5 px-4 rounded-2xl font-semibold text-white hover:bg-black transition-all hover:shadow-lg group">
                <svg class="w-5 h-5 fill-white group-hover:scale-110 transition-transform" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41-84.5-44-35.3-4.5-73.4 20-95.6 20-22.5 0-54.8-19-86.4-19-42.3 0-81.1 24.3-102.8 62.1-44.1 76-11.3 189 31.3 250.4 21 30.1 46 63.9 76.9 62.8 29.6-1.1 40.8-19.1 76.6-19.1 35.8 0 46.2 19.1 77.2 18.5 31.3-.6 53.1-30.8 74.1-61.2 24.2-35.2 34.2-69.3 34.5-71.1-.8-.4-66.3-25.2-66.7-101.5V268.7zM273.1 82.1c15.3-18.5 25.5-44.1 22.7-69.6-21.9 1.3-48.6 15.3-64.3 33.6-14 16.4-26.2 42.6-22.9 67.6 24.4 1.9 49.3-13.1 64.5-31.6z"/></svg>
                Log in with Apple
            </button>
        </div>

        <div class="relative flex items-center mb-8">
            <span class="flex-grow border-t border-slate-200"></span>
            <span class="mx-4 text-xs font-semibold uppercase tracking-widest text-slate-400 bg-white/0 px-2">OR EMAIL</span>
            <span class="flex-grow border-t border-slate-200"></span>
        </div>

        <!-- Form Logic -->
        <form class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" 
                    class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-3.5 text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all">
            </div>
            <div>
                <div class="flex justify-between items-center mb-2 ml-1">
                    <label class="text-sm font-bold text-slate-700">Password</label>
                    <a href="#" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700">Forgot?</a>
                </div>
                <input type="password" id="password" placeholder="••••••••" 
                    class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-3.5 text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all">
            </div>

            <button id="login-btn" type="submit" 
                class="w-full bg-indigo-600 text-white py-4 px-6 rounded-2xl font-bold text-lg hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-500/30 transition-all active:scale-[0.98]">
                Log in to Account
            </button>
        </form>

        <p class="text-center mt-8 text-slate-600 font-medium">
            Don't have an account? 
            <a href="signup.html" id="signup-redirect-link" class="text-indigo-600 font-bold hover:underline underline-offset-4">Sign up free</a>
        </p>
    </div>

    <!-- Footer Elements -->
    <footer class="fixed bottom-0 w-full p-6 flex flex-col md:flex-row justify-between items-center gap-4 text-white/40 text-xs font-semibold tracking-wider uppercase">
        <p>© 2025 JurisGenie Global Infrastructure</p>
        <div class="flex gap-6">
            <a href="#" class="hover:text-white transition-colors">Privacy</a>
            <a href="#" class="hover:text-white transition-colors">Terms</a>
            <a href="#" class="hover:text-white transition-colors">Security</a>
        </div>
    </footer>

    <!-- Auth Script -->
    <script src="js/auth.js"></script>
</body>
</html>
